databaseChangeLog:
  - changeSet:
      id: restructure maven_central_log to store multiple log types
      author: zofia.zuzanna.wiora@jetbrains.com
      changes:
        - renameTable:
            oldTableName: maven_central_log
            newTableName: maven_central_log_old

        - sql:
            sql: ALTER INDEX maven_central_log_pkey RENAME TO maven_central_log_old_pkey;

        - createTable:
            tableName: maven_central_log
            columns:
              - column: { name: id,          type: int,         constraints: { primaryKey: true, nullable: false } }
              - column: { name: log_type,    type: varchar(64), constraints: { nullable: false, unique: true, uniqueConstraintName: uq_maven_central_log_log_type } }
              - column: { name: last_run_at, type: timestamp,   constraints: { nullable: false } }

        - sql:
            sql: >
              INSERT INTO maven_central_log (id, log_type, last_run_at)
              VALUES (1, 'MAVEN_INDEX', (SELECT maven_index_timestamp FROM maven_central_log_old WHERE id = 1)),
                     (2, 'USER_REQUEST_CHECK', current_date - interval '10 years');

        - dropTable:
            tableName: maven_central_log_old