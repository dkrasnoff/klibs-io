databaseChangeLog:
  - changeSet:
      id: add index_request_check_timestamp column to maven_central_log table
      author: zofia.zuzanna.wiora@jetbrains.com
      changes:
        - addColumn:
            tableName: maven_central_log
            columns:
              - column:
                  name: index_request_check_timestamp
                  type: timestamp
                  defaultValueComputed: "current_date - interval '10 years'"
                  constraints:
                    nullable: false