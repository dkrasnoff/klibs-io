databaseChangeLog:
  - changeSet:
      id: enqueue_all_packages_for_dependency_backfill
      author: nikita.vlaev@jetbrains.com
      preConditions:
        - onFail: CONTINUE
        - tableExists:
            tableName: package
        - tableExists:
            tableName: package_index_request
        - tableExists:
            tableName: package_dependency
      changes:
        - sql:
            comment: "Enqueue all existing packages for reindex to backfill package_dependency data"
            sql: |
              INSERT INTO package_index_request (group_id, artifact_id, version, released_ts, reindex, scraper_type)
              SELECT
                p.group_id,
                p.artifact_id,
                p.version,
                p.release_ts,
                TRUE,
                CASE
                  WHEN p.scraper_type = 'SEARCH_MAVEN' THEN 'CENTRAL_SONATYPE'
                  ELSE p.scraper_type
                  END AS scraper_type
              FROM package p
              WHERE NOT EXISTS (
                SELECT 1
                  FROM package_index_request pir
                  WHERE pir.group_id = p.group_id
                  AND pir.artifact_id = p.artifact_id
                  AND pir.version = p.version
              );
