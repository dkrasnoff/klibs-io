databaseChangeLog:
  - changeSet:
      id: add covering index on package for latest_stable_version lookup
      author: nikita.vlaev@jetbrains.com
      preConditions:
        - onFail: MARK_RAN
        - not:
            indexExists:
              tableName: package
              indexName: package_latest_stable_idx
      changes:
        - sql:
            sql: |
              CREATE INDEX package_latest_stable_idx
                  ON package (group_id, artifact_id, release_ts DESC)
                  INCLUDE (version)
                  WHERE version_type = 'STABLE';
      rollback:
        - sql:
            sql: |
              DROP INDEX IF EXISTS package_latest_stable_idx;

  - changeSet:
      id: drop project_index before adding latest_stable_version to package_index
      author: nikita.vlaev@jetbrains.com
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: 1
            sql: |
              SELECT COUNT(*)
              FROM pg_matviews
              WHERE schemaname = current_schema()
                AND matviewname = 'project_index'
      changes:
        - sql:
            sql: |
              DROP MATERIALIZED VIEW IF EXISTS project_index;

  - changeSet:
      id: recreate package_index with latest_stable_version
      author: nikita.vlaev@jetbrains.com
      changes:
        - sqlFile:
            path: 2026-06-05_package_index_add_latest_stable_version.sql
            relativeToChangelogFile: true

  - changeSet:
      id: recreate package_index_fts_gin_idx after latest_stable_version addition
      author: nikita.vlaev@jetbrains.com
      preConditions:
        - onFail: MARK_RAN
        - not:
            indexExists:
              tableName: package_index
              indexName: package_index_fts_gin_idx
      changes:
        - sql:
            sql: |
              CREATE INDEX package_index_fts_gin_idx ON package_index USING GIN (fts);

  - changeSet:
      id: recreate package_index_platforms_vector_gin_idx after latest_stable_version addition
      author: nikita.vlaev@jetbrains.com
      preConditions:
        - onFail: MARK_RAN
        - not:
            indexExists:
              tableName: package_index
              indexName: package_index_platforms_vector_gin_idx
      changes:
        - sql:
            sql: |
              CREATE INDEX package_index_platforms_vector_gin_idx ON package_index USING GIN (platforms_vector);

  - changeSet:
      id: recreate package_index_unique after latest_stable_version addition
      author: nikita.vlaev@jetbrains.com
      preConditions:
        - onFail: MARK_RAN
        - not:
            indexExists:
              tableName: package_index
              indexName: package_index_unique
      changes:
        - createIndex:
            indexName: package_index_unique
            tableName: package_index
            unique: true
            columns:
              - column:
                  name: group_id
              - column:
                  name: artifact_id
      rollback:
        - dropIndex:
            indexName: package_index_unique
            tableName: package_index

  - changeSet:
      id: recreate project_index materialized view after latest_stable_version addition
      author: nikita.vlaev@jetbrains.com
      changes:
        - sqlFile:
            path: 2026-04-30_recreate_project_index_with_health_score.sql
            relativeToChangelogFile: true

  - changeSet:
      id: recreate project_index indexes after latest_stable_version addition
      author: nikita.vlaev@jetbrains.com
      changes:
        - sql:
            sql: CREATE INDEX project_index_fts_gin_idx ON project_index USING GIN (fts)
        - sql:
            sql: CREATE INDEX project_index_platforms_vector_gin_idx ON project_index USING GIN (platforms_vector)
        - sql:
            sql: CREATE INDEX project_index_markers_gin_idx ON project_index USING GIN (markers)
        - createIndex:
            indexName: project_index_stars_idx
            tableName: project_index
            columns:
              - column:
                  name: stars
        - createIndex:
            indexName: project_index_project_id_idx
            tableName: project_index
            columns:
              - column:
                  name: project_id
        - createIndex:
            indexName: project_index_unique
            tableName: project_index
            unique: true
            columns:
              - column:
                  name: project_id
