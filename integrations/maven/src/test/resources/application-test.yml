klibs:
  indexing: false
  indexing-configuration:
    central-sonatype:
      enabled: true
    gmaven:
      enabled: true
  ai: false
  integration:
    maven:
      central:
        rate-limit-capacity: 100
        rate-limit-refill-amount: 100
        rate-limit-refill-period-sec: 5
        discovery-endpoint: http://localhost:8080/discovery
        indexEndpoint: http://localhost:8080/index
        indexDir: /tmp/maven-index
        content-endpoint: http://localhost:8080/content/
        content-fallback-endpoint: http://localhost:8080/fallback/