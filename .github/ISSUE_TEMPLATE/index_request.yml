name: Index new package
description: Request indexing new version of your package
title: "[Add a package]: "
labels: [ "index-request" ]
body:
  - type: markdown
    attributes:
      value: |
        ### Package details
        
        Fill out the details of a package you want to be indexed by klibs. If you leave the version blank, all versions will be indexed.
        
        Remember, that for a package to be indexed successfully, it must meet all the [requirements](https://klibs.io/faq#how-do-i-add-a-project).
  - type: input
    id: group_id
    attributes:
      label: Group ID
      description: "Provide the group ID of the package, e.g., `org.jetbrains.kotlinx`."
    validations:
      required: true
  - type: input
    id: artifact_id
    attributes:
      label: Artifact ID
      description: "Provide the artifact ID of the package, e.g., `kotlinx-coroutines-core`."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "Provide the version of the package, e.g., `1.10.2`. Leave blank if you want all versions to be indexed."
    validations:
      required: false